# Publishes the static site to GitHub Pages. Keep this the only workflow that
# uses actions/deploy-pages, or turn off the duplicate "pages" workflow in
# GitHub → Actions so two jobs do not fight each other.
#
# PDF-only commits under TrainData/incoming/ are ignored (they are common in
# quick succession; deploy after ingest updates trains.js / closures.js).

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - "TrainData/incoming/**"
  workflow_dispatch:

# Do NOT cancel an in-progress Pages deploy when another push lands — that
# produces: "Canceling Pages deployment" / "The operation was canceled"
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: "."

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        env:
          NODE_OPTIONS: --no-deprecation
        uses: actions/deploy-pages@v5

      - name: Wait before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 20

      - name: Retry deploy to GitHub Pages
        if: steps.deployment.outcome == 'failure'
        id: deployment_retry
        env:
          NODE_OPTIONS: --no-deprecation
        uses: actions/deploy-pages@v5
