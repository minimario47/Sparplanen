# Build trains.js + closures.js from all per-day PDFs under TrainData/incoming/<YEAR>-W<WW>/
# Trigger: workflow_dispatch only — e.g. from Google Apps Script after all PDF
# uploads are committed in one batch, so the bundle is complete in a single run.
# Manual: Actions → Ingest plan PDF → Run workflow.
name: Ingest plan PDF

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# Serialize with the Pages workflow so deployments do not fight each other.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: TrainData/requirements.txt

      - name: Install dependencies
        run: pip install -r TrainData/requirements.txt

      - name: Ingest all incoming week PDFs
        run: python3 TrainData/ingest_incoming.py
        # Exit 0 with "no per-day PDFs" if folder layout does not match — step passes.
        # If you have PDFs in the old flat layout, move them to TrainData/incoming/YYYY-Www/day.pdf

      - name: Commit generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            trains.js \
            closures.js
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(data): update schedule from plan PDFs [automated]"
          # Another push (e.g. PDF commits from mail automation) can land on main
          # between checkout and here — rebase, then push; retry on races.
          for i in 1 2 3 4 5; do
            git pull --rebase origin main
            if git push; then
              exit 0
            fi
            echo "push failed, retrying ($i/5) after race..."
            sleep 4
          done
          exit 1

      - uses: actions/upload-pages-artifact@v5
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        env:
          NODE_OPTIONS: --no-deprecation
        uses: actions/deploy-pages@v5

      - name: Wait before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 20

      - name: Retry deploy to GitHub Pages
        if: steps.deployment.outcome == 'failure'
        id: deployment_retry
        env:
          NODE_OPTIONS: --no-deprecation
        uses: actions/deploy-pages@v5
