# Build trains.js + closures.js from all per-day PDFs under TrainData/incoming/<YEAR>-W<WW>/
# Trigger: workflow_dispatch (recommended) — e.g. from Google Apps Script after all PDF uploads
# in one batch, so the bundle is complete in a single run.
# Manual: Actions → Ingest plan PDF → Run workflow.
name: Ingest plan PDF

on:
  workflow_dispatch:
  # Optional: re-run on git push of incoming PDFs (e.g. local); may run once per file if using API 1:1
  push:
    branches: [main]
    paths:
      - "TrainData/incoming/**"

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: TrainData/requirements.txt

      - name: Install dependencies
        run: pip install -r TrainData/requirements.txt

      - name: Ingest all incoming week PDFs
        run: python3 TrainData/ingest_incoming.py
        # Exit 0 with "no per-day PDFs" if folder layout does not match — step passes.
        # If you have PDFs in the old flat layout, move them to TrainData/incoming/YYYY-Www/day.pdf

      - name: Commit generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            trains.js \
            closures.js
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(data): update schedule from plan PDFs [automated]"
          git push
